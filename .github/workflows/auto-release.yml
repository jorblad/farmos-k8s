name: Auto-release on PR label

# Automatically creates a GitHub Release (and triggers the Docker build) when
# a pull request with a release label is merged into the default branch.
#
# HOW TO USE
# -----------
# Option A (automatic on PR merge):
# 1. Add one of the following labels to a pull request:
#      release        – bumps the PATCH version  (v1.2.3 → v1.2.4)
#      release:minor  – bumps the MINOR version  (v1.2.3 → v1.3.0)
#      release:major  – bumps the MAJOR version  (v1.2.3 → v2.0.0)
#
# 2. Merge the pull request into the default branch.
#
# 3. This workflow will:
#      a. Determine the next semantic version by inspecting existing tags.
#      b. Create and push a new annotated Git tag.
#      c. Publish a GitHub Release for that tag (which in turn triggers the
#         Docker build in docker-image.yml via the `release: published` event).
#
# Option B (manual):
# Run this workflow from the Actions tab via "Run workflow" and provide
# `version` as an explicit semver tag (e.g. v1.2.3).
#
# IMPORTANT — SAME-REPO PRs ONLY
# --------------------------------
# This workflow uses the `pull_request` event (not `pull_request_target`).
# PRs that originate from forks receive a read-only GITHUB_TOKEN, so the
# tag push and `gh release create` steps will fail for fork-based PRs.
# Only PRs from branches within this repository are supported.
#
# REQUIRED PERMISSIONS
# ---------------------
# The default GITHUB_TOKEN is used with `contents: write` so no extra secrets
# are needed for same-repo PRs.

on:
  pull_request:
    types: [closed]
  workflow_dispatch:
    inputs:
      version:
        description: "Explicit release version (format: vMAJOR.MINOR.PATCH, e.g. v1.2.3)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    # Only run when the PR was actually merged (not just closed/declined),
    # targets the default branch, originates from the same repository (not a
    # fork — forks receive a read-only GITHUB_TOKEN), and carries at least one
    # of the recognised release labels.
    if: |
      (
        github.event_name == 'workflow_dispatch' &&
        github.ref_name == github.event.repository.default_branch
      ) ||
      (
        github.event.pull_request.merged == true &&
        github.event.pull_request.base.ref == github.event.repository.default_branch &&
        github.event.pull_request.head.repo.full_name == github.repository &&
        (
          contains(github.event.pull_request.labels.*.name, 'release') ||
          contains(github.event.pull_request.labels.*.name, 'release:minor') ||
          contains(github.event.pull_request.labels.*.name, 'release:major')
        )
      )
    runs-on: ubuntu-latest
    # Serialize all auto-release runs to prevent a race where two release-
    # labelled PRs merged in quick succession compute the same NEW_TAG from
    # the same LATEST_TAG.  Setting cancel-in-progress: false ensures both
    # runs complete sequentially rather than one being dropped.
    concurrency:
      group: auto-release
      cancel-in-progress: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          # Check out the merge commit that actually landed on the default branch
          # so the release tag points to the right commit (works correctly with
          # squash and rebase merges as well as regular merges).
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.merge_commit_sha || github.ref }}
          fetch-depth: 0

      - name: Fetch all tags
        run: git fetch --tags origin

      - name: Determine next version and create release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_LABELS: ${{ toJson(github.event.pull_request.labels.*.name) }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          MANUAL_VERSION: ${{ inputs.version }}
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          ACTOR: ${{ github.actor }}
        run: |
          set -euo pipefail

          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            if [ "$REF_NAME" != "$DEFAULT_BRANCH" ]; then
              echo "Manual releases are only allowed from the default branch ('$DEFAULT_BRANCH'). Current ref: '$REF_NAME'." >&2
              exit 1
            fi
            NEW_TAG="$MANUAL_VERSION"
            if ! echo "$NEW_TAG" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
              echo "Invalid manual version '$NEW_TAG'. Expected format: vMAJOR.MINOR.PATCH" >&2
              exit 1
            fi
            echo "Manual release tag: $NEW_TAG"
          else
            # ── Determine bump type from labels ────────────────────────────────
            BUMP="patch"
            if echo "$PR_LABELS" | grep -q '"release:major"'; then
              BUMP="major"
            elif echo "$PR_LABELS" | grep -q '"release:minor"'; then
              BUMP="minor"
            fi
            echo "Bump type: $BUMP"

            # ── Find latest semver tag ─────────────────────────────────────────
            # Use a strict regex so pre-release suffixes (e.g. v1.2.3-alpha) or
            # extra dot-segments (e.g. v1.2.3.4) are excluded, preventing
            # non-numeric PATCH values from breaking the arithmetic below.
            LATEST_TAG=$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | grep -m1 -E '^v[0-9]+\.[0-9]+\.[0-9]+$' || true)
            if [ -z "$LATEST_TAG" ]; then
              LATEST_TAG="v0.0.0"
            fi
            echo "Latest tag: $LATEST_TAG"

            # ── Parse and bump ─────────────────────────────────────────────────
            SEMVER="${LATEST_TAG#v}"
            IFS='.' read -r MAJOR MINOR PATCH <<< "$SEMVER"
            MAJOR=${MAJOR:-0}
            MINOR=${MINOR:-0}
            PATCH=${PATCH:-0}

            case "$BUMP" in
              major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
              minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
              patch) PATCH=$((PATCH + 1)) ;;
            esac

            NEW_TAG="v${MAJOR}.${MINOR}.${PATCH}"
            echo "New tag: $NEW_TAG"
          fi

          TAG_ALREADY_EXISTS=false
          if git fetch origin "refs/tags/${NEW_TAG}" 2>/dev/null; then
            TAG_ALREADY_EXISTS=true
            echo "Tag ${NEW_TAG} already exists on the remote."
          fi

          if [ "$TAG_ALREADY_EXISTS" = "false" ]; then
            # ── Create annotated tag ─────────────────────────────────────────
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
              TAG_MESSAGE="Release $NEW_TAG — manual dispatch by ${ACTOR} from ${REF_NAME}"
            else
              TAG_MESSAGE="Release $NEW_TAG — triggered by PR #${PR_NUMBER}: ${PR_TITLE}"
            fi
            git tag -a "$NEW_TAG" -m "$TAG_MESSAGE"
            git push origin "$NEW_TAG"
          else
            # Tag already exists, so do not fail the run. Continue and create a
            # release if one does not yet exist for this tag.
            echo "Skipping tag creation because ${NEW_TAG} already exists."
          fi

          # ── Publish GitHub Release (triggers docker-image.yml) ─────────────
          if gh release view "$NEW_TAG" >/dev/null 2>&1; then
            echo "Release ${NEW_TAG} already exists — skipping release creation."
            exit 0
          fi
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            RELEASE_NOTES="Manual release $NEW_TAG triggered via workflow_dispatch."
          else
            RELEASE_NOTES="Automated release $NEW_TAG triggered by merging PR #${PR_NUMBER}: ${PR_TITLE}"
          fi
          gh release create "$NEW_TAG" \
            --title "Release $NEW_TAG" \
            --notes "$RELEASE_NOTES" \
            --latest
