name: Build and Push Docker Image

# HOW TO TRIGGER A RELEASE / BUILD
# ----------------------------------
# This workflow runs only when a Git tag is pushed or a GitHub Release is
# published.  It will NOT run when a branch is created (e.g. Renovate PRs).
#
# Option A – GitHub UI (recommended):
#   1. Go to the repository → Releases → "Draft a new release".
#   2. Choose "Create a new tag" and enter a version (e.g. v1.2.3).
#   3. Fill in the release notes and click "Publish release".
#   The workflow triggers via the `release: published` event and tags the
#   Docker image with the release tag name.
#
# Option B – Git CLI:
#   git tag v1.2.3
#   git push origin v1.2.3
#   The workflow triggers via the `create` event (ref_type == 'tag') and tags
#   the Docker image with the pushed tag name.
#
# In both cases two Docker image tags are produced:
#   • jorblad/farmos-k8s:latest
#   • jorblad/farmos-k8s:<version>   (e.g. jorblad/farmos-k8s:v1.2.3)

on:
  # Fires when a tag is pushed directly (git push origin v1.2.3).
  # The job-level `if:` guard below ensures branch creates are skipped.
  create:
  # Fires when a GitHub Release is published via the UI.
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    # Only run for tag creation or published releases — skip branch creates
    # (e.g. Renovate branches) to avoid invalid Docker tag errors.
    if: github.ref_type == 'tag' || github.event_name == 'release'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      # Add PHP and Composer steps here
      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      # The project dependencies are installed inside the Docker image build
      # (the base image provides the required PHP version and extensions).
      # Avoid running Composer on the Actions runner where PHP may not match
      # the farmOS v4 requirement.

      # # (Optional) Commit updated composer.lock if you want to push it back to the repo
      # - name: Commit updated composer.lock
      #   run: |
      #     git config --global user.name "github-actions"
      #     git config --global user.email "github-actions@github.com"
      #     git add project/composer.lock
      #     git commit -m "Update composer.lock" || echo "No changes to commit"
      #     git push || echo "No changes to push"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract version tag
        id: extract_version
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
          elif [ -n "${RELEASE_TAG}" ]; then
            TAG="${RELEASE_TAG}"
          else
            echo "Unable to determine tag — aborting." >&2
            exit 1
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            jorblad/farmos-k8s:latest
            jorblad/farmos-k8s:${{ steps.extract_version.outputs.tag }}
