name: Build and Push Docker Image

# HOW TO TRIGGER A RELEASE / BUILD
# ----------------------------------
# This workflow builds and pushes the Docker image. It is designed to run
# only when a real release is intended. Three supported paths:
#
# Option A – PR label (recommended, fully automated):
#   Add the label "release" to a pull request before merging it.
#   When the PR is merged, auto-release.yml creates a GitHub Release and then
#   dispatches this workflow with the resolved release tag. Use
#   "release:minor" or "release:major" labels for non-patch bumps.
#
# Option B – GitHub UI (manual):
#   1. Go to the repository → Releases → "Draft a new release".
#   2. Choose "Create a new tag" and enter a version (e.g. v1.2.3).
#   3. Fill in the release notes and click "Publish release".
#   The workflow triggers via the `release: published` event and tags the
#   Docker image with the release tag name.
#
# Option C – Git CLI (manual):
#   git tag v1.2.3
#   git push origin v1.2.3
#   The workflow triggers via the `create` event (ref_type == 'tag').
#
# NOTE: The `create` event fires for both branch and tag creation. A workflow
# run is started for every `create` event, but the `build` job is skipped for
# branch creates via the job-level `if:` guard — only tag creates, published
# releases, and explicit dispatches produce a Docker image.
#
# In all cases two Docker image tags are produced:
#   • jorblad/farmos-k8s:latest
#   • jorblad/farmos-k8s:<version>   (e.g. jorblad/farmos-k8s:v1.2.3)

on:
  # Fires when a branch or tag is created, including direct tag pushes
  # (git push origin v1.2.3). The job-level `if:` guard below ensures only
  # tag creates are processed and branch creates are skipped.
  create:
  # Fires when a GitHub Release is published via the UI or auto-release.yml.
  release:
    types: [published]
  # Allows auto-release.yml to explicitly start the Docker publish workflow for
  # tags/releases it creates with GITHUB_TOKEN.
  workflow_dispatch:
    inputs:
      tag:
        description: "Docker image tag to publish"
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    # Only run for tag creation, published releases, or explicit dispatches —
    # skip branch creates (e.g. Renovate branches) to avoid invalid Docker tag
    # errors.
    if: github.ref_type == 'tag' || github.event_name == 'release' || github.event_name == 'workflow_dispatch'
    # Prevent duplicate builds when both `create` (tag push) and
    # `release: published` fire for the same version.  The later-arriving
    # run cancels the earlier one.
    concurrency:
      group: docker-image-${{ inputs.tag || github.event.release.tag_name || github.ref_name }}
      cancel-in-progress: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          ref: ${{ inputs.tag || github.event.release.tag_name || github.ref }}

      # The project dependencies are installed inside the Docker image build
      # (the base image provides the required PHP version and extensions).
      # No PHP or Composer setup is needed on the Actions runner.

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract version tag
        id: extract_version
        env:
          DISPATCH_TAG: ${{ inputs.tag }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          if [ -n "${DISPATCH_TAG}" ]; then
            TAG="${DISPATCH_TAG}"
          elif [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
          elif [ -n "${RELEASE_TAG}" ]; then
            TAG="${RELEASE_TAG}"
          else
            echo "Unable to determine tag — aborting." >&2
            exit 1
          fi

          # Validate that TAG is safe to use as a Docker image tag.
          if [ "${#TAG}" -gt 128 ]; then
            echo "Invalid Docker tag '${TAG}': must be 128 characters or fewer." >&2
            exit 1
          fi
          if [[ "${TAG}" == *"/"* ]]; then
            echo "Invalid Docker tag '${TAG}': must not contain '/'." >&2
            exit 1
          fi
          if ! [[ "${TAG}" =~ ^[A-Za-z0-9_][A-Za-z0-9_.-]*$ ]]; then
            echo "Invalid Docker tag '${TAG}': must start with a letter, digit, or '_', and contain only letters, digits, '_', '.', or '-'." >&2
            exit 1
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            jorblad/farmos-k8s:latest
            jorblad/farmos-k8s:${{ steps.extract_version.outputs.tag }}
