apiVersion: apps/v1
kind: Deployment
metadata:
  name: farmos
  namespace: farmos
  labels:
    app: farmos
spec:
  replicas: 1
  selector:
    matchLabels:
      app: farmos
  template:
    metadata:
      labels:
        app: farmos
    spec:
      securityContext:
        fsGroup: 33
      initContainers:
      - name: farmos-init
        image: jorblad/farmos-k8s:v4.0.8
        securityContext:
          runAsUser: 0
          runAsGroup: 0
        command: [ "/bin/sh", "-c" ]
        args:
        - |
          # Don't use set -e immediately so we can handle errors gracefully
          echo "Starting farmOS initialization..."

          # Initialize sites directory if empty
          if [ ! -f "/opt/drupal/web/sites/default/settings.php" ]; then
            echo "Creating/initializing sites/default directory and settings files..."
            mkdir -p /opt/drupal/web/sites/default
            cp -rp /var/farmOS/web/sites/default/default.settings.php /opt/drupal/web/sites/default/default.settings.php || echo "Warning: default.settings.php copy failed"
            cp -rp /var/farmOS/web/sites/default/default.settings.php /opt/drupal/web/sites/default/settings.php || echo "Warning: settings.php creation failed"
          fi

          # Inject database configuration if not already present
          if ! grep -q "DATABASE_URL" /opt/drupal/web/sites/default/settings.php; then
            echo "Injecting configuration into settings.php..."
            cat /config/settings-extra.php >> /opt/drupal/web/sites/default/settings.php
          fi

          mkdir -p /opt/drupal/private

          chown -R www-data:www-data /opt/drupal/web/sites/default
          # Only chown private on first initialisation to avoid slow restarts on large volumes.
          # Use && so the marker is only written after a successful chown.
          if [ ! -f "/opt/drupal/private/.initialized" ]; then
            chown -R www-data:www-data /opt/drupal/private && \
              touch /opt/drupal/private/.initialized && \
              chown www-data:www-data /opt/drupal/private/.initialized
          fi

          cd /opt/drupal/web

          echo "Fixing permissions (this might take a few minutes on first run)..."
          # Run script without set -e context to prevent minor find/chmod errors from killing the container
          /bin/bash ./drupal_fix_permissions.sh -u=www-data || echo "Warning: Permission script finished with some errors (ignoring)"

          # Now enable exit-on-error for the critical database steps
          set -e

          echo "Waiting for database..."
          until php -r "try { \$pdo = new PDO('pgsql:host=$FARMOS_DB_HOST;port=5432;dbname=$FARMOS_DB_NAME', '$FARMOS_DB_USER', '$FARMOS_DB_PASSWORD'); exit(0); } catch (Exception \$e) { exit(1); }"; do
            echo "Database at $FARMOS_DB_HOST is not reachable yet, waiting..."
            sleep 10
          done

          echo "Database is reachable! Checking if farmOS is installed..."
          # Fix: Drupal 10/Drush expects 'pgsql' scheme, but CNPG provides 'postgresql' or 'postgres'
          # This mismatch causes the "database_driver ... does not exist" error.
          DRUPAL_DB_URL=$(echo "$DATABASE_URL" | sed 's/^\(postgres\|postgresql\):/pgsql:/')

          if ! /opt/drupal/vendor/bin/drush status --format=json | grep -q '"db-status": "Connected"'; then
            echo "farmOS not detected as installed. Attempting site-install..."
            /opt/drupal/vendor/bin/drush site:install farm --db-url="$DRUPAL_DB_URL" --site-name="farmOS" --account-name="admin" --account-pass="admin" --yes || echo "Site install already completed or failed."
          else
             echo "farmOS is already installed. Running updates..."
             /opt/drupal/vendor/bin/drush updb --yes
             /opt/drupal/vendor/bin/drush cr
          fi

          echo "Initialization complete."
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: farmos-db-app
              key: uri
        - name: FARMOS_DB_NAME
          valueFrom:
            secretKeyRef:
              name: farmos-db-app
              key: dbname
        - name: FARMOS_DB_USER
          valueFrom:
            secretKeyRef:
              name: farmos-db-app
              key: username
        - name: FARMOS_DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: farmos-db-app
              key: password
        - name: FARMOS_DB_HOST
          value: "farmos-db-rw"
        - name: DRUSH_OPTIONS_URI
          value: "http://farmos-svc"
        volumeMounts:
        - mountPath: /opt/drupal/web/sites
          name: farmos-sites-volume
        - mountPath: /opt/drupal/private
          name: farmos-sites-volume
          subPath: private
        - mountPath: /config
          name: farmos-settings-extra
      containers:
      - name: farmos
        image: jorblad/farmos-k8s:v4.0.8
        securityContext:
          runAsUser: 33
          runAsGroup: 33
        ports:
        - containerPort: 80
        resources:
          limits:
            memory: "4Gi"
            cpu: "2"
          requests:
            memory: "512Mi"
            cpu: "500m"
        startupProbe:
          httpGet:
            path: /user/login
            port: 80
          failureThreshold: 60 # ~10 minutes (60 * 10s)
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /user/login
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 10
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: farmos-db-app
              key: uri
        - name: FARMOS_DB_NAME
          valueFrom:
            secretKeyRef:
              name: farmos-db-app
              key: dbname
        - name: FARMOS_DB_USER
          valueFrom:
            secretKeyRef:
              name: farmos-db-app
              key: username
        - name: FARMOS_DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: farmos-db-app
              key: password
        - name: FARMOS_DB_HOST
          value: "farmos-db-rw"
        - name: DRUSH_OPTIONS_URI
          value: "http://farmos-svc"
        volumeMounts:
        - mountPath: /opt/drupal/web/sites
          name: farmos-sites-volume
        - mountPath: /opt/drupal/private
          name: farmos-sites-volume
          subPath: private
      volumes:
      - name: farmos-sites-volume
        persistentVolumeClaim:
          claimName: farmos-sites-pvc
      - name: farmos-settings-extra
        configMap:
          name: farmos-settings-extra
