apiVersion: apps/v1
kind: Deployment
metadata:
  name: farmos
  namespace: farmos
  labels:
    app: farmos
spec:
  replicas: 1
  selector:
    matchLabels:
      app: farmos
  template:
    metadata:
      labels:
        app: farmos
    spec:
      securityContext:
        fsGroup: 33
      initContainers:
      - name: farmos-init
        image: jorblad/farmos-k8s:v4.0.0.1
        securityContext:
          runAsUser: 0
          runAsGroup: 0
        command: [ "/bin/sh", "-c" ]
        args:
        - |
          set -e
          echo "Starting farmOS initialization..."
          
          # Initialize sites directory if empty
          if [ ! -d "/opt/drupal/web/sites/default" ]; then
            echo "Creating/initializing sites/default directory..."
            cp -rp /var/farmOS/web/sites/. /opt/drupal/web/sites/
          fi
          
          cd /opt/drupal/web
          
          echo "Fixing permissions..."
          ./drupal_fix_permissions.sh -u=www-data
          
          echo "Waiting for database..."
          until /opt/drupal/vendor/bin/drush sql:query "SELECT 1" > /dev/null 2>&1; do
            echo "Database not ready (or not yet installed), waiting..."
            sleep 5
            # If we've waited a while and it's still not ready, maybe it needs install?
            # But we'll just keep waiting for now to avoid accidental re-installs.
          done
          
          echo "Running database updates..."
          /opt/drupal/vendor/bin/drush updb --yes
          
          echo "Clearing cache..."
          /opt/drupal/vendor/bin/drush cr
          
          echo "Initialization complete."
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: farmos-db-app
              key: uri
        - name: FARMOS_DB_NAME
          valueFrom:
            secretKeyRef:
              name: farmos-db-app
              key: dbname
        - name: FARMOS_DB_USER
          valueFrom:
            secretKeyRef:
              name: farmos-db-app
              key: username
        - name: FARMOS_DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: farmos-db-app
              key: password
        - name: FARMOS_DB_HOST
          value: "farmos-db-rw"
        volumeMounts:
        - mountPath: /opt/drupal/web/sites
          name: farmos-sites-volume
      containers:
      - name: farmos
        image: jorblad/farmos-k8s:v4.0.0.1
        securityContext:
          runAsUser: 33
          runAsGroup: 33
        ports:
        - containerPort: 80
        resources:
          limits:
            memory: "512Mi"
            cpu: "500m"
          requests:
            memory: "256Mi"
            cpu: "250m"
        startupProbe:
          httpGet:
            path: /
            port: 80
          failureThreshold: 30 # ~5 minutes (30 * 10s)
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 10
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: farmos-db-app
              key: uri
        - name: FARMOS_DB_NAME
          valueFrom:
            secretKeyRef:
              name: farmos-db-app
              key: dbname
        - name: FARMOS_DB_USER
          valueFrom:
            secretKeyRef:
              name: farmos-db-app
              key: username
        - name: FARMOS_DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: farmos-db-app
              key: password
        - name: FARMOS_DB_HOST
          value: "farmos-db-rw"
        volumeMounts:
        - mountPath: /opt/drupal/web/sites
          name: farmos-sites-volume
      volumes:
      - name: farmos-sites-volume
        persistentVolumeClaim:
          claimName: farmos-sites-pvc
