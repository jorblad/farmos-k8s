apiVersion: v1
kind: ConfigMap
metadata:
  name: farmos-settings-extra
  namespace: farmos
data:
  settings-extra.php: |
    <?php
    // Injected by farmos-init
    if (getenv('DATABASE_URL')) {
      $db_url = parse_url(getenv('DATABASE_URL'));
      $databases['default']['default'] = [
        'database' => ltrim($db_url['path'], '/'),
        'username' => $db_url['user'],
        'password' => $db_url['pass'],
        'prefix' => '',
        'host' => $db_url['host'],
        'port' => $db_url['port'] ?? 5432,
        'namespace' => 'Drupal\\Core\\Database\\Driver\\pgsql',
        'driver' => 'pgsql',
      ];
    }

    if (!isset($settings['hash_salt'])) {
      $settings['hash_salt'] = 'farmos-k8s-salt-unsecure-change-me';
    }

    $settings['trusted_host_patterns'] = ['.*'];

    // Trust the reverse proxy (K8s ingress) so Drupal uses https:// for all URLs.
    $settings['reverse_proxy'] = TRUE;
    $settings['reverse_proxy_addresses'] = [$_SERVER['REMOTE_ADDR'] ?? ''];
    if (isset($_SERVER['HTTP_X_FORWARDED_PROTO']) && $_SERVER['HTTP_X_FORWARDED_PROTO'] === 'https') {
      $_SERVER['HTTPS'] = 'on';
    }

    // Set the public file base URL using the correct scheme and host.
    // The scheme is determined after reverse proxy detection above.
    $scheme = !empty($_SERVER['HTTPS']) ? 'https' : 'http';
    $host = $_SERVER['HTTP_HOST'] ?? $_SERVER['SERVER_NAME'] ?? 'localhost';
    // Validate host to prevent header injection using PHP's built-in domain validator.
    // Strip any port suffix before validating the hostname portion.
    $hostname = preg_replace('/:\d+$/', '', $host);
    // Strip IPv6 brackets (eg [2001:db8::1]) before IP validation, but keep
    // the original $host (with brackets/port) for URL construction.
    $ip_to_validate = preg_replace('/^\[(.+)\]$/', '$1', $hostname);
    // Allow localhost, IP addresses (including IPv6), and valid FQDNs; reject everything else.
    $valid_host = $hostname === 'localhost'
      || filter_var($ip_to_validate, FILTER_VALIDATE_IP) !== false
      || filter_var($hostname, FILTER_VALIDATE_DOMAIN, FILTER_FLAG_HOSTNAME) !== false;
    if (!$valid_host) {
      $host = 'localhost';
    }
    $settings['file_public_base_url'] = $scheme . '://' . $host . '/sites/default/files';

    // Set the private file system path (outside the web root, on the persistent volume).
    $settings['file_private_path'] = '/opt/drupal/private';
