apiVersion: v1
kind: ConfigMap
metadata:
  name: farmos-settings-extra
  namespace: farmos
data:
  settings-extra.php: |
    <?php
    // Injected by farmos-init
    if (getenv('DATABASE_URL')) {
      $db_url = parse_url(getenv('DATABASE_URL'));
      $databases['default']['default'] = [
        'database' => ltrim($db_url['path'], '/'),
        'username' => $db_url['user'],
        'password' => $db_url['pass'],
        'prefix' => '',
        'host' => $db_url['host'],
        'port' => $db_url['port'] ?? 5432,
        'namespace' => 'Drupal\\Core\\Database\\Driver\\pgsql',
        'driver' => 'pgsql',
      ];
    }

    if (!isset($settings['hash_salt'])) {
      $settings['hash_salt'] = 'farmos-k8s-salt-unsecure-change-me';
    }

    $settings['trusted_host_patterns'] = ['.*'];

    // Trust the reverse proxy (K8s ingress) so Drupal uses https:// for all URLs.
    $settings['reverse_proxy'] = TRUE;
    $settings['reverse_proxy_addresses'] = [$_SERVER['REMOTE_ADDR'] ?? ''];
    if (isset($_SERVER['HTTP_X_FORWARDED_PROTO']) && $_SERVER['HTTP_X_FORWARDED_PROTO'] === 'https') {
      $_SERVER['HTTPS'] = 'on';
    }

    // Set the public file base URL using the correct scheme and host.
    // The scheme is determined after reverse proxy detection above.
    $scheme = (!empty($_SERVER['HTTPS']) && strtolower($_SERVER['HTTPS']) !== 'off') ? 'https' : 'http';
    // Prefer an explicit env var (set via Kubernetes Deployment env) to avoid
    // deriving the canonical host from the request Host header, which can be
    // spoofed. When PUBLIC_FILES_HOST is set it is used as-is; fall back to
    // the request header only when the env var is absent.
    $host = getenv('PUBLIC_FILES_HOST') ?: ($_SERVER['HTTP_HOST'] ?? $_SERVER['SERVER_NAME'] ?? 'localhost');
    // Validate the host value to guard against misconfigured env vars and
    // against header injection on deployments that have not set the env var.
    // Parse host for validation, handling three forms:
    //   Bracketed IPv6:   [2001:db8::1] or [2001:db8::1]:8443
    //   Unbracketed IPv6: 2001:db8::1   (multiple colons, no port)
    //   Hostname/IPv4:    example.com or 192.0.2.1 or example.com:8080
    if (preg_match('/^\[([^\]]+)\](:\d+)?$/', $host, $m)) {
      // Bracketed IPv6 — strip brackets for IP validation; keep original $host for URL.
      $hostname = '[' . $m[1] . ']';
      $ip_to_validate = $m[1];
    } elseif (substr_count($host, ':') > 1) {
      // Unbracketed IPv6 — colons belong to the address, not a port suffix.
      $hostname = $host;
      $ip_to_validate = $host;
    } else {
      // Hostname or IPv4, optionally with a :port suffix.
      $hostname = preg_replace('/:\d+$/', '', $host);
      $ip_to_validate = $hostname;
    }
    // Allow localhost, IP addresses (including IPv6), and valid FQDNs; reject everything else.
    $valid_host = $hostname === 'localhost'
      || filter_var($ip_to_validate, FILTER_VALIDATE_IP) !== false
      || filter_var($hostname, FILTER_VALIDATE_DOMAIN, FILTER_FLAG_HOSTNAME) !== false;
    if (!$valid_host) {
      $host = 'localhost';
    }
    $settings['file_public_base_url'] = $scheme . '://' . $host . '/sites/default/files';

    // Set the private file system path (outside the web root, on the persistent volume).
    $settings['file_private_path'] = '/opt/drupal/private';
