apiVersion: batch/v1
kind: CronJob
metadata:
  name: farmos-drush-cron
  namespace: farmos
spec:
  schedule: "*/15 * * * *" # every 15 minutes
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          securityContext:
            fsGroup: 33
          containers:
          - name: drush-cron
            image: jorblad/farmos-k8s:v4.0.0.1
            imagePullPolicy: IfNotPresent
            command: ["/bin/sh", "-c"]
            args:
              - cd /opt/drupal/web && ./drupal_fix_permissions.sh -u=www-data || true; \
                if command -v drush >/dev/null 2>&1; then drush cron; else php ./vendor/bin/drush cron || true; fi
            env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: farmos-db-app
                  key: uri
            - name: FARMOS_DB_NAME
              valueFrom:
                secretKeyRef:
                  name: farmos-db-app
                  key: dbname
            - name: FARMOS_DB_USER
              valueFrom:
                secretKeyRef:
                  name: farmos-db-app
                  key: username
            - name: FARMOS_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: farmos-db-app
                  key: password
            - name: FARMOS_DB_HOST
              value: "farmos-db"
            volumeMounts:
            - name: farmos-sites-volume
              mountPath: /opt/drupal/web/sites
          volumes:
          - name: farmos-sites-volume
            persistentVolumeClaim:
              claimName: farmos-sites-pvc