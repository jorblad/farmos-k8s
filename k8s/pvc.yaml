apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: farmos-sites-pvc
  namespace: farmos
spec:
  accessModes:
  - ReadWriteMany
  resources:
    requests:
      storage: 15Gi
  storageClassName: longhorn
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: farmos-private-pvc
  namespace: farmos
spec:
  accessModes:
  - ReadWriteMany
  resources:
    requests:
      storage: 5Gi
  storageClassName: longhorn
